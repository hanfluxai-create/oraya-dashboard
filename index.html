<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oraya HQ · Command Deck · v15.0 Signal · updated 2026-07-15</title>
<meta name="description" content="Oraya HQ Command Deck — data-driven cockpit. Current work, prompt armory, condensed archive, update protocol.">
<style>
:root{
  --bg:#f3f5fa; --surface:#ffffff; --surface2:#edf1f8; --surface3:#e2e8f3;
  --border:#e3e9f3; --border2:#c8d3e6;
  --text:#0c1428; --text2:#42506c; --text3:#69769a;
  --accent:#2563eb; --p1:#2563eb; --p2:#f59e0b;
  --green:#0e9f6e; --green-soft:#def7ec;
  --red:#dc2626; --red-soft:#fee2e2;
  --orange:#d97706; --orange-soft:#ffedd5;
  --blue:#2563eb; --blue-soft:#dbeafe;
  --violet:#7c3aed; --violet-soft:#ede9fe;
  --pink:#db2777; --pink-soft:#fce7f3;
  --gold:#b45309;
  --shadow: 0 1px 3px rgba(12,20,40,.07), 0 1px 2px rgba(12,20,40,.05);
  --shadow-lg: 0 10px 30px -8px rgba(12,20,40,.14);
  --glow: 0 0 0 rgba(0,0,0,0);
  --radius:14px;
  --hero-grad: radial-gradient(1100px 500px at 18% -10%, rgba(37,99,235,.10), transparent 60%),
               radial-gradient(900px 420px at 85% -20%, rgba(124,58,237,.10), transparent 60%);
  --sb-w:236px;
}
[data-theme="dark"]{
  --bg:#060a14; --surface:#0d1426; --surface2:#131c33; --surface3:#1b2742;
  --border:#1c2845; --border2:#324569;
  --text:#e9edf8; --text2:#aeb9d6; --text3:#7e8bb0;
  --accent:#5b9bff; --p1:#5b9bff; --p2:#fbbf24;
  --green:#34d399; --green-soft:rgba(52,211,153,.13);
  --red:#f87171; --red-soft:rgba(248,113,113,.13);
  --orange:#fbbf24; --orange-soft:rgba(251,191,36,.13);
  --blue:#5b9bff; --blue-soft:rgba(91,155,255,.14);
  --violet:#a78bfa; --violet-soft:rgba(167,139,250,.14);
  --pink:#f472b6; --pink-soft:rgba(244,114,182,.14);
  --gold:#fcd34d;
  --shadow: 0 1px 3px rgba(0,0,0,.45);
  --shadow-lg: 0 18px 44px -12px rgba(0,0,0,.65);
  --glow: 0 0 24px rgba(91,155,255,.18);
  --hero-grad: radial-gradient(1100px 520px at 18% -10%, rgba(91,155,255,.13), transparent 60%),
               radial-gradient(900px 460px at 85% -18%, rgba(167,139,250,.13), transparent 60%),
               radial-gradient(700px 380px at 50% 110%, rgba(52,211,153,.07), transparent 60%);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); background-image:var(--hero-grad); background-attachment:fixed;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
  font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased;
}
a{color:var(--accent); text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}
button{font-family:inherit}

/* ===== TOP BAR ===== */
.top-bar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:12px 22px;
  background:color-mix(in srgb, var(--surface) 78%, transparent);
  backdrop-filter:blur(14px) saturate(1.4); -webkit-backdrop-filter:blur(14px) saturate(1.4);
  border-bottom:1px solid var(--border);
}
.brand{display:flex; align-items:center; gap:12px; min-width:0}
.brand-mark{
  width:38px; height:38px; border-radius:11px; flex:0 0 auto;
  background:conic-gradient(from 210deg at 50% 50%, var(--p1), var(--violet), var(--p2), var(--p1));
  display:grid; place-items:center; color:#fff; font-weight:800; font-size:19px;
  box-shadow:var(--shadow), var(--glow); letter-spacing:.5px;
}
.brand-txt{display:flex; flex-direction:column; min-width:0}
.brand-title{font-weight:750; font-size:16px; letter-spacing:.2px; display:flex; align-items:center; gap:8px}
.brand-title .lite{
  font-size:10px; font-weight:700; letter-spacing:1.4px; color:var(--text3);
  border:1px solid var(--border2); padding:2px 6px; border-radius:6px; text-transform:uppercase;
}
.brand-sub{font-size:11.5px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60vw}
.tb-spacer{flex:1 1 auto}
.search-pill{
  display:flex; align-items:center; gap:8px;
  background:var(--surface2); border:1px solid var(--border); border-radius:999px;
  padding:7px 12px; min-width:200px;
}
.search-pill svg{flex:0 0 auto; opacity:.6}
.search-pill input{
  border:0; background:transparent; color:var(--text); font-size:13px; width:100%; outline:none;
}
.search-pill kbd{
  font-family:inherit; font-size:10px; color:var(--text3); border:1px solid var(--border2);
  border-radius:5px; padding:1px 5px; background:var(--surface);
}
.tb-btn{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface2); border:1px solid var(--border); color:var(--text2);
  border-radius:9px; padding:8px 12px; font-size:12.5px; font-weight:600; cursor:pointer;
  transition:.15s;
}
.tb-btn:hover{border-color:var(--border2); color:var(--text); transform:translateY(-1px)}
.tb-btn.violet{color:var(--violet); border-color:color-mix(in srgb,var(--violet) 30%,var(--border))}
.tb-btn .arw{opacity:.7}

/* ===== TAB STRIP ===== */
.tabs{
  position:sticky; top:63px; z-index:40;
  display:flex; gap:8px; padding:12px 22px; flex-wrap:wrap;
  background:color-mix(in srgb, var(--bg) 80%, transparent);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.tab{
  position:relative;
  display:inline-flex; align-items:center; gap:9px;
  background:var(--surface); border:1px solid var(--border); color:var(--text2);
  border-radius:11px; padding:9px 16px; font-size:13.5px; font-weight:650; cursor:pointer;
  transition:.15s;
}
.tab:hover{border-color:var(--border2); color:var(--text)}
.tab[aria-selected="true"]{
  background:var(--surface2); color:var(--text); border-color:var(--accent);
  box-shadow:var(--shadow), inset 0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent);
}
.tab .tab-dot{width:7px; height:7px; border-radius:50%; background:var(--text3); opacity:.5}
.tab[aria-selected="true"] .tab-dot{background:var(--accent); opacity:1; box-shadow:0 0 8px var(--accent)}
.tab-badge{
  font-size:10.5px; font-weight:700; color:#fff; background:var(--accent);
  border-radius:999px; padding:1px 7px; min-width:18px; text-align:center;
}
.tab-badge.off{display:none}

/* ===== LAYOUT ===== */
main{max-width:1180px; margin:0 auto; padding:26px 22px 80px}
.section{display:none; animation:fade .3s ease}
.section.active{display:block}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
.block{margin:0 0 30px}
.block-head{display:flex; align-items:baseline; gap:12px; margin:0 0 14px; flex-wrap:wrap}
.block-head h2{font-size:13px; font-weight:750; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); margin:0}
.block-head .count{font-size:12px; color:var(--text3); font-weight:600}
.block-note{font-size:12.5px; color:var(--text3); margin:-6px 0 14px; max-width:820px}
#now .block{scroll-margin-top:120px}
.jump-row{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 24px}
.jump-chip{cursor:pointer; font-family:inherit; color:var(--text3); background:var(--surface2); border:1px solid var(--border); transition:.15s}
.jump-chip:hover{color:var(--text); border-color:var(--border2)}
.jump-chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.fronts-group-label{font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin:18px 0 9px}
.fronts-wrap>.fronts-group-label:first-child{margin-top:0}
.blk-stakes{color:var(--red); font-weight:700}

/* ===== CARD PRIMITIVES ===== */
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 20px; box-shadow:var(--shadow);
}
.chip{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:650; letter-spacing:.2px;
  padding:3px 9px; border-radius:999px;
  background:var(--surface2); color:var(--text2); border:1px solid var(--border);
  white-space:nowrap;
}
.chip.green{background:var(--green-soft); color:var(--green); border-color:transparent}
.chip.red{background:var(--red-soft); color:var(--red); border-color:transparent}
.chip.orange{background:var(--orange-soft); color:var(--orange); border-color:transparent}
.chip.blue{background:var(--blue-soft); color:var(--blue); border-color:transparent}
.chip.violet{background:var(--violet-soft); color:var(--violet); border-color:transparent}
.chip.gray{background:var(--surface3); color:var(--text3); border-color:transparent}
.chip.solid-red{background:var(--red); color:#fff; border-color:transparent}
.led{width:8px; height:8px; border-radius:50%; flex:0 0 auto; display:inline-block}
.led.ok{background:var(--green); box-shadow:0 0 7px var(--green)}
.led.warn{background:var(--orange); box-shadow:0 0 7px var(--orange)}
.led.bad{background:var(--red); box-shadow:0 0 7px var(--red)}
.led.blue{background:var(--blue); box-shadow:0 0 7px var(--blue)}
@media(prefers-reduced-motion:no-preference){
  .led.pulse{animation:pulse 2s ease-in-out infinite}
}
@keyframes pulse{0%,100%{opacity:1} 50%{opacity:.4}}

/* ===== FOCUS TILES ===== */
.focus-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
.focus-tile{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:12px;
  position:relative; overflow:hidden;
}
.focus-tile::before{content:""; position:absolute; inset:0 auto 0 0; width:3px; background:linear-gradient(var(--p1),var(--violet))}
.focus-tile h3{margin:0; font-size:16.5px; line-height:1.35; font-weight:720; padding-left:6px}
.focus-tile .why{font-size:13px; color:var(--text2); padding-left:6px}
.focus-tile .nxt{font-size:12.5px; color:var(--text); padding-left:6px}
.focus-tile .nxt b{color:var(--text3); font-weight:700; font-size:11px; letter-spacing:.6px; text-transform:uppercase; display:block; margin-bottom:2px}
.focus-tile .meta{display:flex; gap:8px; flex-wrap:wrap; padding-left:6px; margin-top:auto}

/* ===== AGENDA ===== */
.agenda{display:grid; gap:10px}
.agenda-item{
  display:flex; align-items:flex-start; gap:12px; padding:12px 14px;
  background:var(--surface2); border:1px solid var(--border); border-radius:10px; cursor:pointer;
  transition:.15s;
}
.agenda-item:hover{border-color:var(--border2)}
.agenda-item input{margin:2px 0 0; width:17px; height:17px; accent-color:var(--accent); cursor:pointer; flex:0 0 auto}
.agenda-item .t{font-size:13.5px; color:var(--text)}
.agenda-item.done .t{color:var(--text3); text-decoration:line-through}

/* ===== FRONTS ===== */
.fronts-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
.front{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:15px 18px; box-shadow:var(--shadow); cursor:pointer; transition:.15s;
}
.front:hover{border-color:var(--border2); transform:translateY(-1px); box-shadow:var(--shadow-lg)}
.front-top{display:flex; align-items:center; gap:10px; justify-content:space-between}
.front-top h3{margin:0; font-size:14.5px; font-weight:700}
.front .one{font-size:12.5px; color:var(--text2); margin:8px 0 0}
.front .nxt{font-size:12px; color:var(--text3); margin:9px 0 0; display:flex; gap:6px}
.front .nxt .arw{color:var(--accent); font-weight:800; flex:0 0 auto}
.front .detail{
  font-size:12.5px; color:var(--text2); margin-top:12px; padding-top:12px;
  border-top:1px dashed var(--border2); display:none;
}
.front.open .detail{display:block}
.front .exp{font-size:11px; color:var(--text3); margin-top:10px; user-select:none}
.front .owner{font-size:10.5px; color:var(--text3); font-weight:650}

/* ===== WAITING TABLE ===== */
.wait{display:grid; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden}
.wait-row{
  display:grid; grid-template-columns:1.4fr 1fr auto 2fr; gap:14px; align-items:center;
  padding:13px 18px; background:var(--surface);
}
.wait-row .what{font-weight:650; font-size:13px}
.wait-row .who{font-size:12px; color:var(--text2)}
.wait-row .days{font-size:12px; font-weight:700; white-space:nowrap; text-align:right}
.wait-row .days.red{color:var(--red)}
.wait-row .days.orange{color:var(--orange)}
.wait-row .note{font-size:11.5px; color:var(--text3)}

/* ===== PIPELINE ===== */
.pipe{display:grid; gap:10px}
.batch{
  display:flex; align-items:center; gap:14px; padding:13px 18px;
  background:var(--surface); border:1px solid var(--border); border-radius:11px; box-shadow:var(--shadow);
}
.batch .nm{font-weight:700; font-size:13.5px; flex:0 0 auto; min-width:150px}
.batch .nt{font-size:12px; color:var(--text3); flex:1 1 auto}
.gate{
  margin-top:14px; padding:18px 20px; border-radius:var(--radius);
  border:1px solid var(--border2); background:var(--surface2); position:relative;
}
.gate.locked{border-color:color-mix(in srgb,var(--red) 40%,var(--border))}
.gate-head{display:flex; align-items:center; gap:10px; margin-bottom:8px}
.gate-head .gl{font-weight:750; font-size:13.5px; letter-spacing:.3px}
.gate .rule{font-size:12.5px; color:var(--text2); margin:0 0 10px}
.gate .metrics{font-size:11.5px; color:var(--text3); border-top:1px dashed var(--border2); padding-top:9px}

/* ===== TOOLS ===== */
.tools-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
.tool{
  display:flex; align-items:center; gap:11px; padding:11px 15px;
  background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow);
}
.tool .body{min-width:0; flex:1 1 auto}
.tool .nm{font-weight:680; font-size:13px}
.tool .st{font-size:11px; color:var(--text3); font-weight:650}
.tool .nt{font-size:11.5px; color:var(--text3); margin-top:2px}

/* ===== COLLAPSIBLE (blockers/decisions) ===== */
details.fold{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
details.fold>summary{
  list-style:none; cursor:pointer; padding:15px 20px; display:flex; align-items:center; gap:12px;
  font-weight:700; font-size:14px;
}
details.fold>summary::-webkit-details-marker{display:none}
details.fold>summary .chev{margin-left:auto; transition:.2s; color:var(--text3)}
details.fold[open]>summary .chev{transform:rotate(180deg)}
details.fold .fold-body{padding:0 20px 18px}
.doc-row{display:flex; align-items:center; gap:11px; padding:10px 0; border-top:1px solid var(--border)}
.doc-row .t{font-size:13px; color:var(--text2)}
.dec-row{padding:11px 0; border-top:1px solid var(--border); display:flex; gap:14px; align-items:baseline}
.dec-row .d{font-size:11px; color:var(--text3); font-weight:700; white-space:nowrap; min-width:74px}
.dec-row .t{font-size:13px; color:var(--text2)}

/* ===== PROMPTS ===== */
.filter-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; align-items:center}
.fchip{
  font-size:12px; font-weight:650; padding:6px 13px; border-radius:999px; cursor:pointer;
  background:var(--surface); border:1px solid var(--border); color:var(--text2); transition:.15s;
}
.fchip:hover{border-color:var(--border2); color:var(--text)}
.fchip[aria-pressed="true"]{background:var(--accent); color:#fff; border-color:transparent}
.prompt-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px}
.prompt{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:11px;
}
.prompt h3{margin:0; font-size:15px; font-weight:720; line-height:1.35}
.prompt .chips{display:flex; gap:7px; flex-wrap:wrap}
.prompt .route{font-size:11px; color:var(--text3)}
.prompt .route b{color:var(--text2); font-weight:700; letter-spacing:.4px; text-transform:uppercase; font-size:10px}
.prompt .usage{font-size:12px; color:var(--text2)}
.prompt .pnote{
  font-size:11.5px; color:var(--gold); background:color-mix(in srgb,var(--gold) 9%,transparent);
  border:1px solid color-mix(in srgb,var(--gold) 28%,transparent); border-radius:9px; padding:9px 12px;
}
.pre-wrap{position:relative}
.prompt pre{
  margin:0; white-space:pre-wrap; word-break:break-word;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:12px; line-height:1.65;
  background:var(--surface2); border:1px solid var(--border); border-radius:11px;
  padding:14px 15px; color:var(--text); max-height:230px; overflow:auto;
}
.copy-btn{
  position:absolute; top:9px; right:9px;
  font-size:11px; font-weight:700; padding:5px 11px; border-radius:8px; cursor:pointer;
  background:var(--surface3); border:1px solid var(--border2); color:var(--text2); transition:.15s;
}
.copy-btn:hover{color:var(--text); border-color:var(--accent)}
.copy-btn.ok{background:var(--green-soft); color:var(--green); border-color:transparent}

/* ===== ARCHIVE ===== */
.arch-intro{font-size:13px; color:var(--text2); margin:0 0 16px}
.arch-list{display:flex; flex-direction:column; gap:2px}
.arch-sep{
  position:sticky; top:112px; z-index:5;
  font-size:11px; font-weight:750; letter-spacing:1px; text-transform:uppercase; color:var(--text3);
  background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:blur(6px);
  padding:9px 4px 6px; margin-top:12px; border-bottom:1px solid var(--border);
}
details.arch{border:1px solid var(--border); border-radius:11px; background:var(--surface); overflow:hidden; box-shadow:var(--shadow)}
details.arch>summary{
  list-style:none; cursor:pointer; padding:12px 16px; display:flex; align-items:center; gap:13px;
}
details.arch>summary::-webkit-details-marker{display:none}
details.arch>summary .adate{font-size:11px; color:var(--text3); font-weight:700; white-space:nowrap; min-width:66px}
details.arch>summary .atitle{font-size:13px; font-weight:640; color:var(--text)}
details.arch>summary .chev{margin-left:auto; color:var(--text3); transition:.2s; flex:0 0 auto}
details.arch[open]>summary .chev{transform:rotate(180deg)}
details.arch[open]>summary{border-bottom:1px solid var(--border); background:var(--surface2)}
.arch-body{padding:14px 16px}
.arch-body .sum{font-size:12.5px; color:var(--text2); margin:0 0 11px}
.arch-body ul{margin:0 0 11px; padding-left:18px}
.arch-body li{font-size:12px; color:var(--text3); margin:3px 0}
.arch-body .tags{display:flex; gap:6px; flex-wrap:wrap}

/* ===== PROTOCOL ===== */
.proto-headline{font-size:20px; font-weight:750; margin:0 0 18px; letter-spacing:-.2px}
.proto-rules{display:grid; gap:11px; margin-bottom:30px; counter-reset:pr}
.proto-rule{
  display:flex; gap:14px; padding:15px 18px; background:var(--surface); border:1px solid var(--border);
  border-radius:11px; box-shadow:var(--shadow);
}
.proto-rule .num{
  counter-increment:pr; flex:0 0 auto; width:26px; height:26px; border-radius:8px;
  background:var(--surface2); color:var(--accent); font-weight:800; font-size:12px;
  display:grid; place-items:center; border:1px solid var(--border);
}
.proto-rule .num::before{content:counter(pr)}
.proto-rule .rt{font-size:13px; color:var(--text2)}
.proto-table{width:100%; border-collapse:collapse; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-top:6px}
.proto-table th,.proto-table td{text-align:left; padding:11px 14px; font-size:12.5px; border-bottom:1px solid var(--border); vertical-align:top}
.proto-table th{background:var(--surface2); color:var(--text3); font-size:10.5px; letter-spacing:1px; text-transform:uppercase; font-weight:750}
.proto-table td{color:var(--text2)}
.proto-table code{font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:var(--accent); background:var(--surface2); padding:1px 5px; border-radius:5px}
.proto-table tr:last-child td{border-bottom:0}
.change-list{display:grid; gap:9px}
.change-item{font-size:12.5px; color:var(--text2); padding:12px 15px; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--violet); border-radius:9px}

/* ===== EMPTY / HIDE / PILL ===== */
.hide{display:none !important}
.empty-state{display:none; padding:34px; text-align:center; color:var(--text3); font-size:13px}
.empty-state.show{display:block}
.search-pill-float{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--text); color:var(--bg); font-size:12.5px; font-weight:700;

  headline:"How to update this dashboard (60-second protocol)",
  rules: [
    "Edit ONLY inside the ORAYA DATA markers. The render layer below them is frozen — content never requires touching it.",
    "After a meeting / WhatsApp thread / transcript: (1) update focus + agenda outcomes, (2) move finished items to archive[] as one condensed entry each, (3) add new prompts to prompts[], (4) update waiting[] dates/entries, (5) bump meta.updated + subtitle, (6) append meta.changelog.",
    "Surgical edits only — python str.replace via bin/_TEMPLATE_dashboard_patch.py (asserts uniqueness, refuses ambiguous patches). Never regenerate this file from scratch.",
    "Archive is append-only. Never delete an archive entry; full verbatim v14 lives at index_v14_backup.html.",
    "Days-ago counters compute themselves from ISO dates — never write '17 days' as text, write since:'2026-06-28'.",
    "Push = bash push-dashboard.sh 'v15.x message' (auto-deploys via Vercel). Human approves every push.",
    "Full doctrine: DASHBOARD_PROTOCOL.md in the repo root. Schema reference lives there too."
  ]
}

/* ═══════════ END ORAYA DATA — RENDER CODE BELOW: DO NOT EDIT FOR CONTENT UPDATES ═══════════ */

/* ---------- helpers ---------- */
const TABS = [
  { id:"now", label:"Now" },
  { id:"prompts", label:"Prompt Armory" },
  { id:"archive", label:"Archive" },
  { id:"protocol", label:"Protocol" }
];
const STATUS_CLASS = { active:"green", gated:"orange", blocked:"red", parked:"gray" };
const LEVEL_CLASS = { ok:"ok", warn:"warn", bad:"bad" };
const BATCH_CLASS = { posting:"green", revising:"orange", generating:"blue" };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function h(tag, attrs){
  const e = document.createElement(tag);
  if(attrs){
    for(const k in attrs){
      const v = attrs[k];
      if(v==null || v===false) continue;
      if(k==="class") e.className = v;
      else if(k==="text") e.textContent = v;
      else if(k==="dataset"){ for(const d in v) e.dataset[d] = v[d]; }
      else if(k.slice(0,2)==="on" && typeof v==="function") e.addEventListener(k.slice(2), v);
      else e.setAttribute(k, v);
    }
  }
  for(let i=2;i<arguments.length;i++){
    let kid = arguments[i];
    if(kid==null || kid===false) continue;
    if(Array.isArray(kid)){ kid.forEach(function(c){ if(c!=null&&c!==false) e.append(c.nodeType?c:document.createTextNode(c)); }); }
    else e.append(kid.nodeType?kid:document.createTextNode(kid));
  }
  return e;
}
function chip(txt, cls){ return h("span",{class:"chip"+(cls?" "+cls:"")}, txt); }
function daysAgo(iso){
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d)) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((today - d) / 86400000);
}
function daysLabel(n){
  if(n==null) return "";
  if(n<=0) return "today";
  if(n===1) return "1 day";
  return n + " days";
}
function copyText(txt, btn){
  function ok(){
    const old = btn.textContent;
    btn.textContent = "Copied ✓"; btn.classList.add("ok");
    setTimeout(function(){ btn.textContent = old; btn.classList.remove("ok"); }, 1500);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(function(){ fallbackCopy(txt); ok(); });
  } else { fallbackCopy(txt); ok(); }
}
function fallbackCopy(txt){
  const ta = document.createElement("textarea");
  ta.value = txt; ta.setAttribute("readonly","");
  ta.style.position="fixed"; ta.style.opacity="0"; ta.style.left="-9999px";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}
/* unit registry for search */
const UNITS = [];
function unit(node, tab, extra){
  node.classList.add("unit");
  node.dataset.tab = tab;
  if(extra){ for(const k in extra) node.dataset[k] = extra[k]; }
  UNITS.push(node);
  return node;
}

/* ---------- chrome ---------- */
function renderChrome(){
  document.getElementById("brandSub").textContent = ORAYA.meta.subtitle;
  const nav = document.getElementById("tabs");
  TABS.forEach(function(t){
    const btn = h("button",{ class:"tab", role:"tab", dataset:{ tab:t.id }, "aria-selected":"false", "aria-controls":t.id },
      h("span",{class:"tab-dot"}), t.label, h("span",{class:"tab-badge off"}, "0"));
    btn.addEventListener("click", function(){ go(t.id); });
    nav.appendChild(btn);
  });
  document.getElementById("footText").textContent = ORAYA.meta.footer;
  document.getElementById("footVer").textContent = "v"+ORAYA.meta.version+" "+ORAYA.meta.codename+" · updated "+ORAYA.meta.updated+" · by "+ORAYA.meta.updatedBy;
}

/* ---------- NOW tab ---------- */
function blockHead(title, count, note){
  const head = h("div",{class:"block-head"}, h("h2",null,title), count!=null?h("span",{class:"count"},count):null);
  return head;
}
function renderNow(){
  const root = document.getElementById("now");
  root.textContent = "";

  /* 0. Jump chips */
  const jumps = [
    ["Focus","now-focus"], ["Agenda","now-agenda"], ["Fronts","now-fronts"],
    ["Waiting","now-waiting"], ["Pipeline","now-pipeline"], ["Blockers","now-blockers"],
    ["Tools","now-tools"], ["Decisions","now-decisions"]
  ];
  const jrow = h("div",{class:"jump-row", role:"navigation", "aria-label":"Jump to section"});
  jumps.forEach(function(j){
    const jc = h("button",{class:"chip jump-chip", type:"button"}, j[0]);
    jc.addEventListener("click", function(){
      const target = document.getElementById(j[1]);
      if(target) target.scrollIntoView({ behavior:"smooth", block:"start" });
    });
    jrow.appendChild(jc);
  });
  root.append(jrow);

  /* 1. Focus */
  let b = h("div",{class:"block", id:"now-focus"});
  b.append(blockHead("Focus — this week"));
  const fg = h("div",{class:"focus-grid"});
  ORAYA.focus.forEach(function(f){
    const overdue = /overdue/i.test(f.due);
    const tile = unit(h("div",{class:"focus-tile"},
      h("h3",null,f.title),
      h("div",{class:"why"}, f.why),
      h("div",{class:"nxt"}, h("b",null,"Next"), f.next),
      h("div",{class:"meta"},
        chip(f.owner, "violet"),
        chip(f.due, overdue?"red":"blue")
      )
    ), "now");
    fg.appendChild(tile);
  });
  b.append(fg); root.append(b);

  /* 2. Agenda */
  b = h("div",{class:"block", id:"now-agenda"});
  b.append(blockHead(ORAYA.agenda.title));
  b.append(h("div",{class:"block-note"}, ORAYA.agenda.note));
  const ag = h("div",{class:"agenda"});
  const saved = loadAgenda();
  ORAYA.agenda.items.forEach(function(it){
    const checked = saved[it.id]!=null ? saved[it.id] : it.done;
    const cb = h("input",{ type:"checkbox", "aria-label":it.t });
    cb.checked = checked;
    const row = unit(h("label",{class:"agenda-item"+(checked?" done":"")}, cb, h("span",{class:"t"}, it.t)), "now");
    cb.addEventListener("change", function(){
      row.classList.toggle("done", cb.checked);
      saveAgenda(it.id, cb.checked);
    });
    ag.appendChild(row);
  });
  b.append(ag); root.append(b);

  /* 3. Fronts */
  b = h("div",{class:"block", id:"now-fronts"});
  b.append(blockHead("Fronts", ORAYA.fronts.length+" workstreams"));
  const frWrap = h("div",{class:"fronts-wrap"});
  ["active","gated","blocked","parked"].forEach(function(st){
    const group = ORAYA.fronts.filter(function(f){ return f.status===st; });
    if(!group.length) return;
    frWrap.append(h("div",{class:"fronts-group-label"}, st.toUpperCase()+" ("+group.length+")"));
    const fr = h("div",{class:"fronts-grid"});
    group.forEach(function(f){
      const detail = h("div",{class:"detail"}, f.detail);
      const exp = h("div",{class:"exp"}, "Click to expand ▾");
      const card = unit(h("div",{class:"front"},
        h("div",{class:"front-top"}, h("h3",null,f.name), chip(f.status, STATUS_CLASS[f.status]||"gray")),
        h("div",{class:"one"}, f.one),
        h("div",{class:"nxt"}, h("span",{class:"arw"},"→"), h("span",null,f.next)),
        h("div",{class:"owner"}, "Owner: "+f.owner),
        detail, exp
      ), "now");
      card.addEventListener("click", function(){
        const open = card.classList.toggle("open");
        exp.textContent = open ? "Click to collapse ▴" : "Click to expand ▾";
      });
      fr.appendChild(card);
    });
    frWrap.append(fr);
  });
  b.append(frWrap); root.append(b);

  /* 4. Waiting */
  b = h("div",{class:"block", id:"now-waiting"});
  b.append(blockHead("Waiting on", ORAYA.waiting.length));
  const wt = h("div",{class:"wait"});
  ORAYA.waiting.slice().sort(function(a,b){ return (daysAgo(b.since)||0) - (daysAgo(a.since)||0); }).forEach(function(w){
    const n = daysAgo(w.since);
    const sev = n>=14 ? "red" : (n>=7 ? "orange" : "");
    const row = unit(h("div",{class:"wait-row"},
      h("div",{class:"what"}, w.what),
      h("div",{class:"who"}, w.who),
      h("div",{class:"days "+sev}, daysLabel(n)),
      h("div",{class:"note"}, w.note)
    ), "now");
    wt.appendChild(row);
  });
  b.append(wt); root.append(b);

  /* 5. Pipeline + gate */
  b = h("div",{class:"block", id:"now-pipeline"});
  b.append(blockHead(ORAYA.pipeline.title));
  const pp = h("div",{class:"pipe"});
  ORAYA.pipeline.batches.forEach(function(bt){
    const row = unit(h("div",{class:"batch"},
      h("span",{class:"led "+(BATCH_CLASS[bt.status]||"ok")+(bt.status==="posting"?" pulse":"")}),
      h("span",{class:"nm"}, bt.name),
      chip(bt.status, BATCH_CLASS[bt.status]||"gray"),
      h("span",{class:"nt"}, bt.note)
    ), "now");
    pp.appendChild(row);
  });
  b.append(pp);
  const g = ORAYA.pipeline.gate;
  const gate = unit(h("div",{class:"gate"+(g.open?"":" locked")},
    h("div",{class:"gate-head"},
      h("span",{class:"led "+(g.open?"ok":"bad")+(g.open?"":" pulse")}),
      h("span",{class:"gl"}, g.label),
      chip(g.open?"OPEN":"LOCKED", g.open?"green":"solid-red")
    ),
    h("p",{class:"rule"}, g.rule),
    h("div",{class:"metrics"}, g.metrics)
  ), "now");
  b.append(gate); root.append(b);

  /* 6. Blockers (collapsed) */
  b = h("div",{class:"block", id:"now-blockers"});
  const blk = ORAYA.blockers;
  const blkBody = h("div",{class:"fold-body"});
  blkBody.append(h("div",{class:"block-note", style:"margin-top:4px"}, blk.note));
  blk.items.forEach(function(it){
    blkBody.append(h("div",{class:"doc-row"}, h("span",{class:"led "+(it.done?"ok":"bad")}), h("span",{class:"t"}, it.t)));
  });
  const blkOpen = blk.items.filter(function(i){ return i.done===false; }).length;
  const blkDet = unit(h("details",{class:"fold"},
    h("summary",null,
      h("span",{class:"led bad"}),
      h("span",{class:"blk-head-txt"}, "Compliance gate — ", h("span",{class:"blk-stakes"}, blkOpen+" open · consumer outreach LOCKED")),
      h("span",{class:"chev"},"▾")
    ),
    blkBody
  ), "now");
  b.append(blkDet); root.append(b);

  /* 7. Tools */
  b = h("div",{class:"block", id:"now-tools"});
  b.append(blockHead("Tools & access", ORAYA.tools.length));
  const tg = h("div",{class:"tools-grid"});
  ORAYA.tools.forEach(function(t){
    const row = unit(h("div",{class:"tool"},
      h("span",{class:"led "+(LEVEL_CLASS[t.level]||"warn")+(t.level==="bad"?" pulse":"")}),
      h("div",{class:"body"},
        h("div",{class:"nm"}, t.name),
        h("div",{class:"st"}, t.state),
        h("div",{class:"nt"}, t.note)
      )
    ), "now");
    tg.appendChild(row);
  });
  b.append(tg); root.append(b);

  /* 8. Decisions (collapsed, newest first) */
  b = h("div",{class:"block", id:"now-decisions"});
  const decBody = h("div",{class:"fold-body"});
  ORAYA.decisions.forEach(function(d){
    decBody.append(h("div",{class:"dec-row"}, h("span",{class:"d"}, d.d), h("span",{class:"t"}, d.t)));
  });
  const decDet = unit(h("details",{class:"fold"},
    h("summary",null, h("span",{class:"led ok"}), "Recent decisions", chip(ORAYA.decisions.length, "gray"), h("span",{class:"chev"},"▾")),
    decBody
  ), "now");
  b.append(decDet); root.append(b);
}

/* ---------- PROMPTS tab ---------- */
function renderPrompts(){
  const root = document.getElementById("prompts");
  root.textContent = "";
  const readyN = ORAYA.prompts.filter(function(p){ return /ready/i.test(p.status); }).length;
  root.append(h("div",{class:"block-head"}, h("h2",null,"Prompt Armory"), h("span",{class:"count"}, readyN+" ready · "+ORAYA.prompts.length+" total")));

  const projects = ["All"];
  ORAYA.prompts.forEach(function(p){ if(projects.indexOf(p.project)<0) projects.push(p.project); });
  const bar = h("div",{class:"filter-bar"});
  projects.forEach(function(pr){
    const c = h("button",{class:"fchip", "aria-pressed": pr==="All"?"true":"false"}, pr);
    c.addEventListener("click", function(){
      STATE.promptProj = pr;
      bar.querySelectorAll(".fchip").forEach(function(x){ x.setAttribute("aria-pressed", x===c?"true":"false"); });
      refresh();
    });
    bar.appendChild(c);
  });
  root.append(bar);

  const grid = h("div",{class:"prompt-grid"});
  ORAYA.prompts.forEach(function(p){
    const pre = h("pre");
    pre.textContent = p.text;
    const copy = h("button",{class:"copy-btn", type:"button"}, "Copy");
    copy.addEventListener("click", function(){ copyText(p.text, copy); });
    const card = unit(h("div",{class:"prompt"},
      h("h3",null, p.id+" · "+p.title),
      h("div",{class:"chips"}, chip(p.agent), chip(p.project,"blue"), chip(p.status, /ready/i.test(p.status)?"green":(/parked/i.test(p.status)?"gray":"orange")), chip("updated "+p.updated,"gray date-chip")),
      h("div",{class:"route"}, h("b",null,"routing: "), p.file),
      h("div",{class:"usage"}, p.usage),
      p.note ? h("div",{class:"pnote"}, p.note) : null,
      h("div",{class:"pre-wrap"}, pre, copy)
    ), "prompts", { proj:p.project });
    grid.appendChild(card);
  });
  root.append(grid);
  root.append(h("div",{class:"empty-state"}, "no matches — clear filters"));
}

/* ---------- ARCHIVE tab ---------- */
function renderArchive(){
  const root = document.getElementById("archive");
  root.textContent = "";
  const items = ORAYA.archive.slice().sort(function(a,b){ return a.date<b.date?1:(a.date>b.date?-1:0); });
  root.append(h("div",{class:"block-head"}, h("h2",null,"Archive"), h("span",{class:"count"}, ORAYA.archive.length+" records")));
  root.append(h("p",{class:"arch-intro"}, ORAYA.archive.length+" condensed records · newest first · full verbatim v14 → ",
    h("a",{href:"index_v14_backup.html"}, "index_v14_backup.html")));

  /* tag filter */
  const tagSet = [];
  items.forEach(function(it){ (it.tags||[]).forEach(function(t){ if(tagSet.indexOf(t)<0) tagSet.push(t); }); });
  tagSet.sort();
  const bar = h("div",{class:"filter-bar"});
  ["All"].concat(tagSet).forEach(function(tg){
    const c = h("button",{class:"fchip", "aria-pressed": tg==="All"?"true":"false"}, tg);
    c.addEventListener("click", function(){
      STATE.archiveTag = tg;
      bar.querySelectorAll(".fchip").forEach(function(x){ x.setAttribute("aria-pressed", x===c?"true":"false"); });
      refresh();
    });
    bar.appendChild(c);
  });
  root.append(bar);

  const list = h("div",{class:"arch-list"});
  let curMonth = "";
  items.forEach(function(it){
    const d = new Date(it.date+"T00:00:00");
    const mk = isNaN(d) ? it.date : (MONTHS[d.getMonth()]+" "+d.getFullYear());
    if(mk!==curMonth){
      curMonth = mk;
      list.append(h("div",{class:"arch-sep"}, mk));
    }
    const body = h("div",{class:"arch-body"},
      h("p",{class:"sum"}, it.summary),
      (it.key_facts&&it.key_facts.length) ? h("ul",null, it.key_facts.map(function(k){ return h("li",null,k); })) : null,
      h("div",{class:"tags"}, (it.tags||[]).map(function(t){ return chip(t,"violet"); }))
    );
    const det = unit(h("details",{class:"arch"},
      h("summary",null,
        h("span",{class:"adate"}, it.date),
        h("span",{class:"atitle"}, it.title),
        h("span",{class:"chev"},"▾")
      ),
      body
    ), "archive", { tags:(it.tags||[]).join(" ") });
    list.append(det);
  });
  root.append(list);
  root.append(h("div",{class:"empty-state"}, "no matches — clear filters"));
}

/* ---------- PROTOCOL tab ---------- */

  const root = document.getElementById("protocol");
  root.textContent = "";
  root.append(h("h2",{class:"proto-headline"}, ORAYA.protocol.headline));
  const rules = h("div",{class:"proto-rules"});

    ["focus", "3 tiles: this-week priorities (title, why, next, owner, due)", "top of every session"],
    ["agenda", "standing next-sync checklist (items[].done)", "before/after each founder sync"],
    ["fronts", "workstream cards (status: active/gated/blocked/parked)", "when a workstream changes state"],
    ["waiting", "blocked-on rows (since: ISO → auto days-ago)", "when something starts/stops blocking"],
    ["pipeline", "content batches + LinkedIn outreach gate", "on batch status or gate flip"],
    ["blockers", "compliance gate items (consumer funnel only)", "when a registration/item clears"],
    ["tools", "access + infra status (level: ok/warn/bad)", "on access/expiry/quota change"],
    ["decisions", "dated locked decisions, newest first", "when a call is made (append)"],

  ];

/* ---------- routing ---------- */
function go(id){
  if(!TABS.some(function(t){return t.id===id;})) id = "now";
  document.querySelectorAll(".section").forEach(function(s){ s.classList.toggle("active", s.id===id); });
  document.querySelectorAll(".tab").forEach(function(t){ t.setAttribute("aria-selected", t.dataset.tab===id?"true":"false"); });
  if(location.hash.slice(1)!==id) history.replaceState(null,"","#"+id);
  window.scrollTo({ top:0, behavior:"auto" });
}

/* ---------- agenda persistence ---------- */
function loadAgenda(){ try{ return JSON.parse(localStorage.getItem("oraya-v15-agenda")||"{}"); }catch(e){ return {}; } }
function saveAgenda(id, val){ const m = loadAgenda(); m[id] = val; try{ localStorage.setItem("oraya-v15-agenda", JSON.stringify(m)); }catch(e){} }

/* ---------- search / filter ---------- */
const STATE = { search:"", promptProj:"All", archiveTag:"All" };
function refresh(){
  const q = STATE.search.trim().toLowerCase();
  const counts = { now:0, prompts:0, archive:0, protocol:0 };
  UNITS.forEach(function(u){
    let ok = true;
    if(q && u._search.indexOf(q)<0) ok = false;
    if(ok && u.dataset.tab==="prompts" && STATE.promptProj!=="All" && u.dataset.proj!==STATE.promptProj) ok = false;
    if(ok && u.dataset.tab==="archive" && STATE.archiveTag!=="All" && (" "+(u.dataset.tags||"")+" ").indexOf(" "+STATE.archiveTag+" ")<0) ok = false;
    u.classList.toggle("hide", !ok);
    if(ok) counts[u.dataset.tab]++;
  });
  /* month separators: hide when no visible sibling details before next sep */
  document.querySelectorAll("#archive .arch-sep").forEach(function(sep){
    let any = false, n = sep.nextElementSibling;
    while(n && !n.classList.contains("arch-sep")){
      if(n.classList.contains("arch") && !n.classList.contains("hide")){ any = true; break; }
      n = n.nextElementSibling;
    }
    sep.classList.toggle("hide", !any);
  });
  /* tab badges */
  document.querySelectorAll(".tab").forEach(function(t){
    const badge = t.querySelector(".tab-badge");
    const c = counts[t.dataset.tab];
    if(q){ badge.textContent = c; badge.classList.remove("off"); }
    else { badge.classList.add("off"); }
  });
  /* empty states */
  ["prompts","archive"].forEach(function(id){
    const sec = document.getElementById(id);
    const emp = sec.querySelector(".empty-state");
    const active = (id==="prompts" && STATE.promptProj!=="All") || (id==="archive" && STATE.archiveTag!=="All") || !!q;
    if(emp) emp.classList.toggle("show", counts[id]===0 && active);
  });
  ["now","protocol"].forEach(function(id){
    const sec = document.getElementById(id);
    let emp = sec.querySelector(".search-empty");
    if(q && counts[id]===0){
      if(!emp){ emp = h("div",{class:"empty-state search-empty show"}, "no matches in this tab"); sec.appendChild(emp); }
      else emp.classList.add("show");
    } else if(emp){ emp.classList.remove("show"); }
  });
  /* floating pill */
  const pill = document.getElementById("searchPill");
  if(q){
    const total = counts.now+counts.prompts+counts.archive+counts.protocol;
    pill.textContent = total+" match"+(total===1?"":"es")+" across tabs";
    pill.classList.add("show");
  } else { pill.classList.remove("show"); }
}

/* ---------- theme ---------- */
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeIcon").innerHTML = t==="dark" ? "☾" : "☀";
  try{ localStorage.setItem("oraya-theme", t); }catch(e){}
}

/* ---------- init ---------- */
function init(){
  renderChrome();
  renderNow();
  renderPrompts();
  renderArchive();
  renderProtocol();
  /* build search index */
  UNITS.forEach(function(u){ u._search = u.textContent.toLowerCase(); });

  /* theme */
  let saved = "dark";
  try{ saved = localStorage.getItem("oraya-theme") || "dark"; }catch(e){}
  applyTheme(saved==="light"?"light":"dark");
  document.getElementById("themeToggle").addEventListener("click", function(){
    applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark");
  });

  /* routing */
  go(location.hash.slice(1) || "now");
  window.addEventListener("hashchange", function(){ go(location.hash.slice(1) || "now"); });

  /* search wiring */
  const search = document.getElementById("search");
  search.addEventListener("input", function(){ STATE.search = search.value; refresh(); });
  document.addEventListener("keydown", function(e){
    if(e.key==="/" && document.activeElement!==search){ e.preventDefault(); search.focus(); }
    else if((e.metaKey||e.ctrlKey) && (e.key==="k"||e.key==="K")){ e.preventDefault(); search.focus(); search.select(); }
    else if(e.key==="Escape" && document.activeElement===search){ search.value=""; STATE.search=""; refresh(); search.blur(); }
  });

  refresh();
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", init);
else init();
</script>
