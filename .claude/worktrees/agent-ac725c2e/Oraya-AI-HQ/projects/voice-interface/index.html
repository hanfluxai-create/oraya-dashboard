<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Oraya Voice HQ — Gemini face, Claude brain</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #07090d;
    --panel: #0e1218;
    --panel-hi: #141a23;
    --line: #1e2632;
    --text: #e6ecf3;
    --dim: #7a8699;
    --accent: #7cffb2;
    --accent-2: #6aa8ff;
    --warn: #ffb86a;
    --red: #ff6a7a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, system-ui, "SF Pro Text", Inter, sans-serif;
  }
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
    gap: 16px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
  }
  header h1 {
    margin: 0; font-size: 15px; font-weight: 600; letter-spacing: 0.2px;
  }
  header .sub { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--panel-hi); border: 1px solid var(--line);
    font-size: 12px; color: var(--dim);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .status.connected .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status.error .dot { background: var(--red); }
  .status.hq .dot { background: var(--accent-2); box-shadow: 0 0 10px var(--accent-2); }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    min-height: 0;
  }
  .pane {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .pane h2 {
    margin: 0 0 10px 0;
    font-size: 12px; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--dim); font-weight: 600;
  }
  .log {
    flex: 1; overflow-y: auto;
    font: 13px/1.55 ui-monospace, "SF Mono", Menlo, monospace;
    background: #05070a;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
  }
  .log .entry { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed #1a2230; }
  .log .entry:last-child { border: 0; }
  .log .tag {
    display: inline-block; padding: 1px 7px; border-radius: 4px;
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    margin-right: 6px;
  }
  .tag.user   { background: #1a2a1d; color: var(--accent); }
  .tag.gemini { background: #1a2230; color: var(--accent-2); }
  .tag.hq     { background: #2a1f12; color: var(--warn); }
  .tag.hq-reply { background: #1f2a1a; color: var(--accent); }
  .tag.err    { background: #2a1218; color: var(--red); }

  footer {
    display: flex; align-items: center; gap: 12px;
    padding: 14px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px;
  }
  button {
    border: 1px solid var(--line); background: var(--panel-hi);
    color: var(--text); padding: 10px 16px; border-radius: 10px;
    font-size: 13px; cursor: pointer; font-weight: 500;
    transition: all 120ms;
  }
  button:hover:not(:disabled) { background: #1b2330; border-color: #2a3544; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: linear-gradient(180deg, #1e2d25, #0e1a15);
    border-color: #2a4b3a; color: var(--accent);
  }
  button.primary.live {
    background: linear-gradient(180deg, #2d1e1e, #1a0e0e);
    border-color: #4b2a2a; color: var(--red);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 106, 122, 0.4); }
    50%      { box-shadow: 0 0 0 6px rgba(255, 106, 122, 0); }
  }
  input[type=text] {
    flex: 1; background: #05070a; border: 1px solid var(--line);
    color: var(--text); padding: 10px 12px; border-radius: 10px;
    font: 13px ui-monospace, Menlo, monospace;
  }
  .meter {
    width: 60px; height: 6px; background: #05070a; border-radius: 3px;
    overflow: hidden; border: 1px solid var(--line);
  }
  .meter > div {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 60ms;
  }
  .ws { color: var(--dim); font: 11px ui-monospace, Menlo, monospace; }
  pre.json {
    margin: 4px 0 0 0; padding: 6px 8px;
    background: #05070a; border-radius: 6px;
    font-size: 11px; color: var(--dim); white-space: pre-wrap;
    border-left: 2px solid var(--line);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Oraya Voice HQ</h1>
      <div class="sub">Gemini 3.1 Flash Live is the face. Claude HQ is the brain.</div>
    </div>
    <div class="status" id="status"><span class="dot"></span><span id="statusText">disconnected</span></div>
  </header>

  <main>
    <section class="pane">
      <h2>Conversation</h2>
      <div id="convoLog" class="log"></div>
    </section>
    <section class="pane">
      <h2>HQ Activity</h2>
      <div id="hqLog" class="log"></div>
    </section>
  </main>

  <footer>
    <button id="connectBtn" class="primary">Connect</button>
    <button id="talkBtn" disabled>Hold to Talk</button>
    <div class="meter"><div id="meter"></div></div>
    <input type="text" id="textInput" placeholder="or type a message (enter to send)" disabled>
    <span class="ws" id="wsUrl">ws://127.0.0.1:8787</span>
  </footer>
</div>

<script>
// ============== Config ==============
const BRIDGE_URL = "ws://127.0.0.1:8787";
const SAMPLE_RATE_IN = 16000;   // send to Gemini
const SAMPLE_RATE_OUT = 24000;  // Gemini returns 24kHz PCM16

// ============== State ==============
let ws = null;
let audioCtx = null;
let micStream = null;
let micNode = null;
let playCtx = null;
let playQueueTime = 0;
let talking = false;

// ============== UI helpers ==============
const $ = (id) => document.getElementById(id);
const statusEl = $("status");
const statusText = $("statusText");
const convoLog = $("convoLog");
const hqLog = $("hqLog");

function setStatus(cls, text) {
  statusEl.className = "status " + cls;
  statusText.textContent = text;
}
function logEntry(target, tag, tagClass, text, json) {
  const div = document.createElement("div");
  div.className = "entry";
  div.innerHTML = `<span class="tag ${tagClass}">${tag}</span><span></span>`;
  div.children[1].textContent = text;
  if (json) {
    const pre = document.createElement("pre");
    pre.className = "json";
    pre.textContent = typeof json === "string" ? json : JSON.stringify(json, null, 2);
    div.appendChild(pre);
  }
  target.appendChild(div);
  target.scrollTop = target.scrollHeight;
}

// ============== Audio: capture ==============
// Convert Float32 [-1,1] to PCM16 little-endian, base64 encode
function float32ToPCM16Base64(f32) {
  const buf = new ArrayBuffer(f32.length * 2);
  const view = new DataView(buf);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  // base64
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// Downsample from device rate to 16kHz
function downsample(input, srcRate, dstRate) {
  if (srcRate === dstRate) return input;
  const ratio = srcRate / dstRate;
  const outLen = Math.round(input.length / ratio);
  const out = new Float32Array(outLen);
  let posOut = 0, posIn = 0;
  while (posOut < outLen) {
    const nextPosIn = Math.round((posOut + 1) * ratio);
    let sum = 0, count = 0;
    for (; posIn < nextPosIn && posIn < input.length; posIn++) {
      sum += input[posIn]; count++;
    }
    out[posOut++] = count ? sum / count : 0;
  }
  return out;
}

async function startMic() {
  if (micStream) return;
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: {
      echoCancellation: true, noiseSuppression: true, autoGainControl: true,
    },
  });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(micStream);
  // ScriptProcessor is deprecated but works everywhere; AudioWorklet would be cleaner
  const proc = audioCtx.createScriptProcessor(4096, 1, 1);
  proc.onaudioprocess = (ev) => {
    if (!talking || !ws || ws.readyState !== 1) return;
    const input = ev.inputBuffer.getChannelData(0);
    // VU meter
    let peak = 0;
    for (let i = 0; i < input.length; i++) { const a = Math.abs(input[i]); if (a > peak) peak = a; }
    $("meter").style.width = Math.min(100, peak * 140) + "%";

    const pcm = downsample(input, audioCtx.sampleRate, SAMPLE_RATE_IN);
    const b64 = float32ToPCM16Base64(pcm);
    ws.send(JSON.stringify({ type: "audio", data: b64 }));
  };
  source.connect(proc);
  proc.connect(audioCtx.destination); // required to pump
  micNode = proc;
}

// ============== Audio: playback ==============
function ensurePlayCtx() {
  if (!playCtx) {
    playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE_OUT });
    playQueueTime = playCtx.currentTime;
  }
}
function playPCM16Base64(b64) {
  ensurePlayCtx();
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const view = new DataView(bytes.buffer);
  const samples = bytes.length / 2;
  const f32 = new Float32Array(samples);
  for (let i = 0; i < samples; i++) {
    const s = view.getInt16(i * 2, true);
    f32[i] = s / 0x8000;
  }
  const buf = playCtx.createBuffer(1, samples, SAMPLE_RATE_OUT);
  buf.getChannelData(0).set(f32);
  const src = playCtx.createBufferSource();
  src.buffer = buf;
  src.connect(playCtx.destination);
  const startAt = Math.max(playCtx.currentTime, playQueueTime);
  src.start(startAt);
  playQueueTime = startAt + buf.duration;
}

// ============== WebSocket ==============
function connect() {
  if (ws && ws.readyState === 1) return;
  setStatus("", "connecting...");
  ws = new WebSocket(BRIDGE_URL);
  ws.onopen = async () => {
    setStatus("connected", "connected, Gemini booting");
    await startMic();
    $("talkBtn").disabled = false;
    $("textInput").disabled = false;
    $("connectBtn").textContent = "Disconnect";
  };
  ws.onclose = () => {
    setStatus("error", "disconnected");
    $("talkBtn").disabled = true;
    $("textInput").disabled = true;
    $("connectBtn").textContent = "Connect";
    ws = null;
  };
  ws.onerror = () => {
    setStatus("error", "bridge unreachable");
    logEntry(convoLog, "err", "err", "Cannot reach bridge at " + BRIDGE_URL, null);
  };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    switch (msg.type) {
      case "ready":
        setStatus("connected", "Gemini live, HQ standing by");
        break;
      case "audio":
        playPCM16Base64(msg.data);
        break;
      case "transcript":
        logEntry(convoLog, "gemini", "gemini", msg.data, null);
        break;
      case "turn_complete":
        logEntry(convoLog, "gemini", "gemini", "[turn complete]", null);
        break;
      case "interrupted":
        // Drop the playback queue so user interruption feels snappy
        playQueueTime = playCtx ? playCtx.currentTime : 0;
        break;
      case "hq_query":
        setStatus("hq", "HQ working...");
        logEntry(hqLog, "HQ ←", "hq", `intent=${msg.data.intent}  urgency=${msg.data.urgency || "normal"}`, msg.data.user_request);
        break;
      case "hq_response":
        setStatus("connected", "Gemini live, HQ standing by");
        try {
          const parsed = JSON.parse(msg.data);
          logEntry(hqLog, "HQ →", "hq-reply", parsed.spoken_reply || "(empty)", parsed);
        } catch {
          logEntry(hqLog, "HQ →", "hq-reply", msg.data, null);
        }
        break;
      case "error":
        logEntry(convoLog, "err", "err", msg.message, null);
        setStatus("error", "error");
        break;
    }
  };
}
function disconnect() {
  if (ws) ws.close();
}

// ============== Buttons ==============
$("connectBtn").onclick = () => {
  if (ws && ws.readyState === 1) disconnect();
  else connect();
};
const talkBtn = $("talkBtn");
function startTalk() {
  if (!ws || ws.readyState !== 1) return;
  talking = true;
  talkBtn.classList.add("live");
  talkBtn.textContent = "Release to send";
}
function endTalk() {
  if (!talking) return;
  talking = false;
  talkBtn.classList.remove("live");
  talkBtn.textContent = "Hold to Talk";
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "end_turn" }));
  $("meter").style.width = "0%";
}
talkBtn.onmousedown = startTalk;
talkBtn.onmouseup = endTalk;
talkBtn.onmouseleave = endTalk;
talkBtn.ontouchstart = (e) => { e.preventDefault(); startTalk(); };
talkBtn.ontouchend = (e) => { e.preventDefault(); endTalk(); };
// Spacebar = PTT
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !e.repeat && document.activeElement !== $("textInput")) {
    e.preventDefault(); startTalk();
  }
});
document.addEventListener("keyup", (e) => {
  if (e.code === "Space") { e.preventDefault(); endTalk(); }
});

$("textInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && ws && ws.readyState === 1) {
    const v = e.target.value.trim();
    if (!v) return;
    logEntry(convoLog, "you", "user", v, null);
    ws.send(JSON.stringify({ type: "text", data: v }));
    e.target.value = "";
  }
});

$("wsUrl").textContent = BRIDGE_URL;
</script>
</body>
</html>
